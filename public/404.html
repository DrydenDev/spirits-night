<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Spirits Night</title>
  <script>
    // GitHub Pages SPA redirect: forward unknown paths to the SPA
    // so React Router can handle client-side routing.
    var l = window.location;
    l.replace(l.origin + '/?/' + l.pathname.slice(1) + l.search + l.hash);
  </script>
</head>
</html>
