    expansion: Jagged Earth
    slug: habsburg-livestock
    difficulty: 2
    loss_condition:
      title: Irreparable Damage
      description: "Track how many [[Blight]] come off the Blight Card during Ravages that do 8+ Damage to the land. If that number ever exceeds players, the Invaders win."
    escalation:
      title: Seek Prime Territory
      description: "After Exploring: On Each board with 4 or fewer [[Blight]], add 1 [[Town]] to a land without [[Town]]/[[Blight]]. On each board with 2 or fewer [[Blight]], do so again."
    levels:
      - level: 1
        title: Migratory Herders
        difficulty: 3
        fear: 3/4/3
        description: "After the normal Build Step: In each land matching a Build Card, Gather 1 [[Town]] from a land *not* matching a Build Card. (In board/land order.)"
      - level: 2
        title: More Rural Than Urban
        difficulty: 5
        fear: 4/5/2
        description: "During Setup, on each board, add 1 [[Town]] to land #2 and 1 [[Town]] to the highest-numbered land without Setup symbols. During Play, when Invaders would build 1 [[City]] in an inland land, they instead Build 2 [[Town]]."
      - level: 3
        title: Fast Spread
        difficulty: 6
        fear: 4/5/3
        description: "When making the Invader Deck, Remove 1 additional Stage I Card. (New deck order: 11-2222-33333)"
      - level: 4
        title: Herds Thrive in Verdant Lands
        difficulty: 8
        fear: 4/5/3
        description: "[[Town]] in lands without [[Blight]] are *Durable*: they have +2 Health, and \"Destroy [[Town]]\" effects instead deal 2 Damage (to those [[Town]] only) per [[Town]] they could Destroy. (\"Destroy all [[Town]]\" works normally.)"
      - level: 5
        title: Wave of Immigration
        difficulty: 9
        fear: 4/6/3
        description: "Before the initial Explore, put the Habsburg Reminder Card under the top 5 Invader Cards. When Revealed, on each board, add 1 [[City]] to a Coastland land without [[City]] and 1 [[Town]] to the 3 Inland lands with the fewest [[Blight]]."
      - level: 6
        title: Far-Flung Herds
        difficulty: 10
        fear: 5/6/3
        description: "Ravages do +2 Damage (total) if any adjacent lands have [[Town]]. (This does not cause lands without Invaders to Ravage.)"
