  - name: The Tsardom of Russia
    expansion: Jagged Earth
    slug: russia
    difficulty: 1
    loss_condition:
      title: Hunters Swarm the Island
      description: "Put [[Beast]] Destroyed by Adversary rules on this panel. If there are ever more [[Beast]] on this panel than on the island, the Invaders win."
    escalation:
      title: Stalk the Predators
      description: "*On each board*: Add 2 [[Explorer]] (total) among lands with [[Beast]]. If you can't, instead add 2 [[Explorer]] among lands with [[Beast]] on a different board."
    levels:
      - level: 1
        title: Hunters Bring Home Shell and Hide
        difficulty: 3
        fear: 3/3/4
        description: "During Setup, on each board, add 1 [[Beast]] and 1 [[Explorer]] to the highest-numbered land without [[Town]]/[[City]]. During Play, [[Explorer]] do +1 Damage. When Ravage adds [[Blight]] to a land (including cascades), Destroy 1 [[Beast]] in that land."
      - level: 2
        title: A Sense for Impending Disaster
        difficulty: 4
        fear: 4/3/4
        description: "The first time each Action would Destroy [[Explorer]]: If possible, 1 of those [[Explorer]] is instead Pushed. 1 [[Fear]] when you do so."
      - level: 3
        title: Competition Among Hunters
        difficulty: 6
        fear: 4/4/3
        description: "Ravage Cards also match lands with 3 or more [[Explorer]]. (If the land already matched the Ravage Card, it still Ravages just once.)"
      - level: 4
        title: Accelerated Exploitation
        difficulty: 7
        fear: 4/4/4
        description: "When making the Invader Deck, put 1 Stage III Card after each Stage II Card. (New Deck Order: 111-2-3-2-3-2-3-2-33)"
      - level: 5
        title: Entrench in the Face of Fear
        difficulty: 9
        fear: 4/5/4
        description: "Put an unused Stage II Invader Card under the top 3 Fear Cards, and an unused Stage III Card under the top 7 Fear Cards. When one is revealed, immediately place it in the Build space (face-up)."
      - level: 6
        title: Pressure for Fast Profit
        difficulty: 11
        fear: 5/5/4
        description: "After the Ravage Step of turn 2+, on each board where it added no [[Blight]]: In the land with the most [[Explorer]] (min.  1), add 1 [[Explorer]] and 1 [[Town]]."
    reference:
