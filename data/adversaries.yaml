    expansion: Branch and Claw
    slug: france
    difficulty: 2
    loss_condition:
      title: Sprawling Plantations
      description: "Before Setup, return all but 7 [[Town]] per player to the box. Invaders win if you ever cannot place a [[Town]]."
    escalation:
      title: Demand for New Cash Crops
      description: "After Exploring, on each board, pick a land of the shown terrain. If it has [[Town]]/[[City]], add 1 [[Blight]]. Otherwise, add 1 [[Town]]."
    levels:
      - level: 1
        title: Frontier Explorers
        difficulty: 3
        fear: 3/3/3
        description: "Except during Setup: After Invaders successfully Explore into a land which had no [[Town]]/[[City]], add 1 [[Explorer]] there."
      - level: 2
        title: Slave Labor
        difficulty: 5
        fear: 3/4/3
        description: "During Setup, put the \"Slave Rebellion\" event under the top 3 cards of the Event Deck. After Invaders Build in a land with 2 [[Explorer]] or more, replace all but 1 [[Explorer]] there with an equal number of [[Town]]."
      - level: 3
        title: Early Plantation
        difficulty: 7
        fear: 4/4/3
        description: "During Setup, on each board add 1 [[Town]] to the highest-numbered land without [[Town]]. Add 1 [[Town]] to land #1."
      - level: 4
        title: Triangle Trade
        difficulty: 8
        fear: 4/4/4
        description: "Whenever Invaders Build a Coastal [[City]], add 1 [[Town]] to the adjacent land with the fewest [[Town]]."
      - level: 5
        title: Slow-Healing Ecosystem
        difficulty: 9
        fear: 4/5/4
        description: "When you remove [[Blight]] from the board, put it here instead of onto the Blight Card. As soon as you have 3 [[Blight]] per player here, move it all back to the Blight Card."
      - level: 6
        title: Persistent Explorers
        difficulty: 10
        fear: 4/5/5
        description: "After resolving an Explore Card, on each board add 1 [[Explorer]] to a land without any. Fear Card effects never remove [[Explorer]]. If one would, you may instead Push that [[Explorer]]."
