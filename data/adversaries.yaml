  - name: The Kingdom of Scotland
    expansion: Feather and Flame
    slug: scotland
    difficulty: 1
    loss_condition:
      title: Trade Hub
      description: "If the number of Coastal lands with [[City]] is ever greater than (2 x # of boards), the Invaders win."
    escalation:
      title: Ports Sprawl Outward
      description: "On the single board with the most Coastal [[Town]]/[[City]], add 1 [[Town]] to the N lands with the fewest [[Town]] (N = # of players.)"
    levels:
      - level: 1
        title: Trading Port
        difficulty: 3
        fear: 3/4/3
        description: "After Setup, in Coastal lands, Explore Cards add 1 [[Town]] instead of 1 [[Explorer]]. \"Coastal Lands\" invader cards do this for maximum 2 land per board."
      - level: 2
        title: Seize Opportunity
        difficulty: 4
        fear: 4/4/3
        description: "During Setup, add 1 [[City]] to land #2. Place \"Coastal Lands\" as the 3rd Stage II card, and move the two Stage II Cards above it up by one. (New Deck Order: 11-22-1-C2-33333, where C is the Stage II Coastal Lands Card.)"
      - level: 3
        title: Chart the Coastline
        difficulty: 6
        fear: 4/5/4
        description: "In Coastal lands, Build Cards affect lands without Invaders, so long as there is an adjacent [[City]]."
      - level: 4
        title: Ambition of a Minor Nation
        difficulty: 7
        fear: 5/5/4
        description: "During Setup, replace the bottom Stage I Card with the bottom Stage III Card. (New Deck Order: 11-22-3-C2-3333)"
      - level: 5
        title: Runoff and Bilgewater
        difficulty: 8
        fear: 5/6/4
        description: "After a Ravage Action adds [[Blight]] to a Coastal Land, add 1 [[Blight]] to that board's Ocean (without cascading). Treat the Ocean as a Coastal Wetland for this rule and for [[Blight]] removal/movement."
      - level: 6
        title: Exports Fuel Inward Growth
        difficulty: 10
        fear: 6/6/4
        description: "After the Ravage step, add 1 [[Town]] to each Inland land that matches a Ravage card and is within [[Range 1]] of [[Town]]/[[City]]."
    reference:
      - level: 1
        title: Trading Port
        phase: Explore
        type: Level
        description: "In Coastal lands, Explore Cards add 1 [[Town]] instead of 1 [[Explorer]]. \"Coastal Lands\" invader cards do this for maximum 2 lands per board."
      - level: 2
        title: Seize Opportunity
