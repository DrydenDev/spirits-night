      - level: 2
        title: Criminals and Malcontents
        difficulty: 4
        fear: 4/4/3
        description: "During Setup, on each board add 1 [[City]] to land #1 and 1 [[Town]] to land #2"
      - level: 3
        title: High Immigration (I)
        difficulty: 6
        fear: 4/5/4
        description: "Put the \"High Immigration\" tile on the Invader board, to the left of \"Ravage\". The Invaders take this Build action each Invader phase before Ravaging. Cards slide left from Ravage to it, and from it to the discard pile. Remove the tile when a Stage II card slides onto it, putting that card in the discard."
      - level: 4
        title: High Immigration (full)
        difficulty: 7
        fear: 4/5/5
        description: "The extra Build tile remains out the entire game."
      - level: 5
        title: Local Autonomy
        difficulty: 9
        fear: 4/5/5
        description: "[[Town]]/[[City]] have +1 Health."
      - level: 6
        title: Independent Resolve
        difficulty: 11
        fear: 4/5/5
        description: "During Setup, add an additional [[Fear]] to the Fear Pool per player in the game. During any Invader Phase where you resolve no Fear Cards, perform the Build from High Immigration twice. (_This has no effect if no card is on the extra Build slot._)"
