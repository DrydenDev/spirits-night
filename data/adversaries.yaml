    slug: sweden
    difficulty: 1
    escalation:
      title: Swayed by the Invaders
      description: "After Invaders Explore into each land this Phase, if that land has at least as many Invaders as [[Dahan]], replace 1 [[Dahan]] with 1 [[Town]]"
    levels:
      - level: 1
        title: Heavy Mining
        difficulty: 2
        fear: 3/3/3
        description: "If the Invaders do at least 6 Damage to the land during Ravage, add an extra [[Blight]]. The additional [[Blight]] does not destroy Presence or cause cascades."
      - level: 2
        title: Population Pressure at Home
        difficulty: 3
        fear: 3/4/3
        description: "During Setup, on each board add 1 [[City]] to land #4. On boards where land #4 starts with [[Blight]], put that [[Blight]] in land #5 instead."
      - level: 3
        title: Fine Steel for Tools and Guns
        difficulty: 5
        fear: 3/4/3
        description: "[[Town]] deal 3 Damage. [[City]] deal 5 Damage."
      - level: 4
        title: Royal Backing
        difficulty: 6
        fear: 3/4/4
        description: "During Setup, after adding all other Invaders, discard the top card of the Invader Deck. On each board, add 1 [[Town]] to the land of that terrain with the fewest Invaders."
      - level: 5
        title: Mining Rush
        difficulty: 7
        fear: 4/4/4
        description: "When Ravaging adds at least 1 [[Blight]] to a land, also add 1 [[Town]] to an adjacent land without [[Town]]/[[City]]. Cascading [[Blight]] does not cause this effect."
      - level: 6
        title: Prospecting Outpost
        difficulty: 8
        fear: 4/4/5
        description: "During setup, on each board add 1 [[Town]] and 1 [[Blight]] to land #8. The [[Blight]] comes from the box, not the Blight Card."
